<!DOCTYPE html>
<html>
<head>

<meta name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover">

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Quran Audio Reader</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

</head>

<body>

<div class="phone">

    <!-- HEADER -->
    <div class="header">
        <h2>Quran Reader</h2>
    </div>

    <div class="content">

        <!-- SURAH SELECT -->
        <select id="surahSelect">
            {% for row in surahs %}
            <option value="{{ row.surah }}">
                {{ row.surah }} - {{ surah_names[row.surah] }}
            </option>
            {% endfor %}
        </select>

<!-- BOTTOM CONTROL BAR -->
<div class="bottom-bar">

    <button class="bar-btn" onclick="playSurah()">
        ▶
    </button>

    <button class="bar-btn danger" onclick="stopReading()">
        ■
    </button>


    <i id="gearIcon" class="gear-icon">⚙️</i>

</div>

        <!-- STATUS -->
        <div id="status"></div>

        <!-- AYAH DISPLAY -->
        <div id="ayahs"></div>

    </div>
</div>

<!-- AUDIO -->
<audio id="audioPlayer"></audio>

<!-- SCRIPT -->
<script src="{{ url_for('static', filename='app.js') }}"></script>

<!-- ================= SETTINGS MODAL ================= -->
<div id="settingsModal" class="modal hidden">

    <div class="modal-content">

        <h2>Settings</h2>

        <label class="setting-item">
            <input type="checkbox" id="setArabic">
            Play Arabic
        </label>

        <br><br>

        <label class="setting-item">
            <input type="checkbox" id="setEnglish">
            Play English
        </label>

        <br><br>

        <label class="setting-item">
            Reciter:
            <select id="setReciter">
                <option value="Alafasy_128kbps">Alafasy</option>
                <option value="Abdul_Basit_Mujawwad_128kbps">Abdul Basit</option>
                <option value="Husary_128kbps">Husary</option>
                <option value="Minshawy_Murattal_128kbps">Minshawy</option>
            </select>
        </label>

        <label class="setting-item">
            Font Size:
            <input type="range" id="setFontSize" min="16" max="32" step="1">
            <span id="fontSizeLabel"></span>
        </label>

        <br><br>

        <div class="modal-actions">
            <button id="closeSettingsBtn">✖</button>
        </div>

    </div>
</div>

</body>
</html>
